services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: resonance
      POSTGRES_PASSWORD: resonance
      POSTGRES_DB: resonance
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resonance"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9002:9000"
      - "9001:9001"

  backend:
    platform: linux/amd64
    build:
      context: ./backend
      platforms:
        - linux/amd64
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://resonance:resonance@db:5432/resonance
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_TRACKS: resonance-tracks
      CLAP_DEVICE: cpu
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - models:/models

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
  models: